# Secrets-scan workflow.
#
# Runs gitleaks on every pull request and every push to main, so
# future commits can't accidentally re-introduce credentials, license
# keys, or other sensitive bytes without the run going red and the PR
# being blocked.
#
# Ported from the original GitLab CI draft on the audit-gitleaks-ci
# branch (commit 701dcc0) when the project moved to GitHub. We
# install the gitleaks binary directly rather than using
# gitleaks/gitleaks-action — fewer moving parts, no license check,
# and the same scan as the local pre-commit hook.

name: Secrets scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    env:
      # Pinned for pipeline reproducibility; matches the version
      # used during the 2026-04-28 pre-release audit and the local
      # pre-commit hook. Bump when you want newer detection rules.
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so PR scans cover every commit in the PR,
          # not just the merge result.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan working tree + history
        run: gitleaks detect --source . --redact --verbose --no-banner
